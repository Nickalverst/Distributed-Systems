<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promoções — SD UTFPR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f11;
    --surface:   #1a1a1f;
    --surface2:  #22222a;
    --border:    #2e2e38;
    --text:      #e8e6e0;
    --muted:     #6b6870;
    --amber:     #f0c040;
    --amber-dim: #7a5f10;
    --green:     #3ecf6e;
    --red:       #e05555;
    --blue:      #5b9cf6;
    --radius:    10px;
    --font: 'Inter', system-ui, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── layout ───────────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: 240px 1fr 300px;
    grid-template-rows: 52px 1fr;
    grid-template-areas:
      "topbar topbar topbar"
      "sidebar main  notif";
    min-height: 100vh;
  }

  @media (max-width: 900px) {
    .shell {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr auto;
      grid-template-areas: "topbar" "sidebar" "main" "notif";
    }
    .notif-panel { max-height: 260px; }
  }

  /* ── topbar ───────────────────────────────────────────────── */
  .topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-brand {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topbar-brand span { color: var(--amber); }

  .sse-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .sse-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .sse-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sse-dot.error     { background: var(--red); }

  /* ── sidebar (categorias) ─────────────────────────────────── */
  .sidebar {
    grid-area: sidebar;
    padding: 20px 16px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .category-list { display: flex; flex-direction: column; gap: 4px; }

  .category-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 10px;
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .category-btn:hover { background: var(--surface2); color: var(--text); }

  .category-btn.active {
    background: var(--surface2);
    border-color: var(--amber-dim);
    color: var(--amber);
  }

  .category-btn .cat-icon { font-size: 15px; margin-right: 7px; }

  .cat-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
    background: var(--amber-dim);
    color: var(--amber);
    display: none;
  }

  .category-btn.active .cat-badge { display: inline; }

  /* ── hot deal toggle ──────────────────────────────────────── */
  .hotdeal-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 9px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .hotdeal-toggle:hover { border-color: var(--amber-dim); }

  .hotdeal-toggle.active {
    background: rgba(240, 192, 64, 0.1);
    border-color: var(--amber);
    color: var(--amber);
  }

  .hotdeal-icon { font-size: 15px; }

  .hotdeal-label { flex: 1; }

  .hotdeal-check {
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .hotdeal-toggle.active .hotdeal-check { opacity: 1; }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* ── main area ────────────────────────────────────────────── */
  .main {
    grid-area: main;
    padding: 20px;
    overflow-y: auto;
  }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .main-header h1 {
    font-size: 16px;
    font-weight: 600;
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-refresh:hover { background: var(--border); }

  /* ── cards grid ───────────────────────────────────────────── */
  .promo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .promo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
  }

  .promo-card:hover { border-color: #3e3e50; }

  .promo-card.hot {
    border-color: var(--amber-dim);
    box-shadow: 0 0 0 1px var(--amber-dim);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-cat {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .hot-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--amber-dim);
    color: var(--amber);
    white-space: nowrap;
    animation: hotpulse 2s ease-in-out infinite;
  }

  @keyframes hotpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(240, 192, 64, 0); }
    50%       { box-shadow: 0 0 8px 2px rgba(240, 192, 64, 0.25); }
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
  }

  .card-id {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }

  .vote-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .vote-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: var(--font);
    line-height: 1;
  }

  .vote-btn:hover.up   { border-color: var(--green); color: var(--green); background: rgba(62,207,110,0.08); }
  .vote-btn:hover.down { border-color: var(--red);   color: var(--red);   background: rgba(224,85,85,0.08); }
  .vote-btn.voted.up   { border-color: var(--green); color: var(--green); background: rgba(62,207,110,0.12); }
  .vote-btn.voted.down { border-color: var(--red);   color: var(--red);   background: rgba(224,85,85,0.12); }
  .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .vote-score {
    font-size: 13px;
    font-weight: 600;
    min-width: 24px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .vote-score.positive { color: var(--green); }
  .vote-score.negative { color: var(--red); }

  /* ── empty state ──────────────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--muted);
    gap: 8px;
    grid-column: 1 / -1;
  }

  .empty-state .empty-icon { font-size: 36px; opacity: 0.4; }
  .empty-state p { font-size: 13px; }

  /* ── notif panel ──────────────────────────────────────────── */
  .notif-panel {
    grid-area: notif;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .notif-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .notif-clear {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: var(--font);
  }

  .notif-clear:hover { color: var(--text); }

  .notif-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    display: flex;
    flex-direction: column-reverse;
  }

  .notif-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    animation: slidein 0.25s ease;
  }

  @keyframes slidein {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .notif-item.hot .notif-product { color: var(--amber); }

  .notif-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .notif-tag.hot-tag { color: var(--amber); }

  .notif-product {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
  }

  .notif-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .notif-empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }

  /* ── toast ────────────────────────────────────────────────── */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    max-width: 280px;
    animation: toastIn 0.2s ease;
    pointer-events: all;
  }

  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }
  .toast.info    { border-left: 3px solid var(--blue); }
  .toast.hot     { border-left: 3px solid var(--amber); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── scrollbar ────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="shell">

  <!-- ── topbar ─────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">
      <span>⚡</span> PromoRadar
    </div>
    <div class="sse-indicator">
      <div class="sse-dot" id="sseDot"></div>
      <span id="sseLabel">conectando...</span>
    </div>
  </header>

  <!-- ── sidebar ────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-title">Destaques</div>
    <button class="hotdeal-toggle" id="hotDealToggle">
      <span class="hotdeal-icon">🔥</span>
      <span class="hotdeal-label">Receber hot deals</span>
      <span class="hotdeal-check">✓</span>
    </button>

    <div class="sidebar-divider"></div>

    <div class="sidebar-title">Suas categorias</div>
    <div class="category-list" id="categoryList"></div>
  </aside>

  <!-- ── main ───────────────────────────────────────────────── -->
  <main class="main">
    <div class="main-header">
      <h1 id="mainTitle">Todas as promoções</h1>
      <button class="btn-refresh" onclick="loadPromos()">↻ Atualizar</button>
    </div>
    <div class="promo-grid" id="promoGrid">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>Nenhuma promoção publicada ainda.</p>
        <p>Volte em breve para ver novidades.</p>
      </div>
    </div>
  </main>

  <!-- ── notif panel ────────────────────────────────────────── -->
  <aside class="notif-panel">
    <div class="notif-header">
      <span>Notificações em tempo real</span>
      <button class="notif-clear" onclick="clearNotifs()">Limpar</button>
    </div>
    <div class="notif-list" id="notifList">
      <div class="notif-empty" id="notifEmpty">
        Quando promoções das categorias que você segue forem publicadas ou virarem hot deal, elas aparecerão aqui automaticamente.
      </div>
    </div>
  </aside>

</div>

<!-- ── toast container ──────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<script>
  /* ── config ─────────────────────────────────────────────────
     Ajuste a BASE_URL para o endereço real do seu Gateway Flask  */
  const BASE_URL = 'http://localhost:5000';

  /* ── categorias disponíveis no sistema ──────────────────────
     Mantidas aqui no front; o interesse é salvo via REST no Gateway */
  const ALL_CATEGORIES = [
    { id: 'livro',        label: 'Livros',        icon: '📚' },
    { id: 'jogo',         label: 'Jogos',          icon: '🎮' },
    { id: 'eletronico',   label: 'Eletrônicos',    icon: '💻' },
    { id: 'roupa',        label: 'Roupas',          icon: '👕' },
    { id: 'alimento',     label: 'Alimentos',      icon: '🛒' },
    { id: 'esporte',      label: 'Esportes',        icon: '⚽' },
    { id: 'casa',         label: 'Casa',            icon: '🏠' },
    { id: 'viagem',       label: 'Viagens',         icon: '✈️' },
  ];

  /* ── state ───────────────────────────────────────────────── */
  let followedCategories = new Set(
    JSON.parse(localStorage.getItem('followed_categories') || '[]')
  );
  // Hot deal é uma notificação global, separada das categorias de produto.
  // Default true: preserva o comportamento que já existia (hot deal sempre visível)
  // até o usuário decidir desativar explicitamente.
  let wantsHotDeals = JSON.parse(localStorage.getItem('wants_hotdeals') ?? 'true');
  let promos = [];          // promoções carregadas do backend
  let votes  = {};          // { promotion_id: +1|-1 } — votos dados nesta sessão
  let hotDeals = new Set(); // IDs que já viraram hot deal
  let eventSource = null;

  /* ── init ────────────────────────────────────────────────── */
  renderCategories();
  renderHotDealToggle();
  loadPromos();
  connectSSE();

  /* ── hot deal toggle ─────────────────────────────────────── */
  function renderHotDealToggle() {
    const btn = document.getElementById('hotDealToggle');
    btn.classList.toggle('active', wantsHotDeals);
  }

  document.getElementById('hotDealToggle').addEventListener('click', () => {
    wantsHotDeals = !wantsHotDeals;
    localStorage.setItem('wants_hotdeals', JSON.stringify(wantsHotDeals));
    renderHotDealToggle();
    showToast(
      wantsHotDeals ? '🔥 Você vai receber notificações de hot deals' : 'Notificações de hot deals desativadas',
      wantsHotDeals ? 'hot' : 'info'
    );
  });

  /* ── categories ──────────────────────────────────────────── */
  function renderCategories() {
    const list = document.getElementById('categoryList');
    list.innerHTML = '';
    ALL_CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-btn' + (followedCategories.has(cat.id) ? ' active' : '');
      btn.dataset.id = cat.id;
      btn.innerHTML = `
        <span><span class="cat-icon">${cat.icon}</span>${cat.label}</span>
        <span class="cat-badge">seguindo</span>`;
      btn.addEventListener('click', () => toggleCategory(cat.id, btn));
      list.appendChild(btn);
    });
  }

  async function toggleCategory(id, btn) {
    const following = followedCategories.has(id);
    const method = following ? 'DELETE' : 'POST';

    try {
      const res = await fetch(`${BASE_URL}/interesses`, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: 'user1', category: id })
      });

      if (!res.ok) throw new Error(await res.text());

      if (following) {
        followedCategories.delete(id);
        btn.classList.remove('active');
        showToast(`Deixou de seguir: ${id}`, 'info');
      } else {
        followedCategories.add(id);
        btn.classList.add('active');
        showToast(`Seguindo: ${id}`, 'success');
      }
      localStorage.setItem('followed_categories', JSON.stringify([...followedCategories]));
    } catch (err) {
      /* fallback offline: alterna localmente para facilitar testes sem backend */
      if (following) {
        followedCategories.delete(id);
        btn.classList.remove('active');
      } else {
        followedCategories.add(id);
        btn.classList.add('active');
      }
      localStorage.setItem('followed_categories', JSON.stringify([...followedCategories]));
      showToast('Interesse salvo localmente (backend offline)', 'info');
    }
  }

  /* ── load promos ─────────────────────────────────────────── */
  async function loadPromos() {
    try {
      const res = await fetch(`${BASE_URL}/promocoes`);
      if (!res.ok) throw new Error(res.statusText);
      promos = await res.json();
      renderPromos();
    } catch (err) {
      renderPromos(); // renderiza vazio com estado offline
      showToast('Não foi possível carregar promoções — verifique se o Gateway está rodando.', 'error');
    }
  }

  function renderPromos() {
    const grid = document.getElementById('promoGrid');
    if (!promos.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>Nenhuma promoção publicada ainda.</p>
          <p>Volte em breve para ver novidades.</p>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    promos.forEach(p => {
      const isHot   = hotDeals.has(p.promotion_id) || p.is_hot_deal;
      const score   = p.score ?? 0;
      const myVote  = votes[p.promotion_id];
      const cat     = ALL_CATEGORIES.find(c => c.id === p.category);
      const catIcon = cat ? cat.icon : '🏷️';

      const card = document.createElement('div');
      card.className = 'promo-card' + (isHot ? ' hot' : '');
      card.id = `card-${p.promotion_id}`;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-cat">${catIcon} ${p.category}</span>
          ${isHot ? '<span class="hot-badge">🔥 hot deal</span>' : ''}
        </div>
        <div class="card-name">${escHtml(p.product_name)}</div>
        <div class="card-id">#${escHtml(p.promotion_id)}</div>
        <div class="card-footer">
          <div class="vote-row">
            <button
              class="vote-btn up ${myVote === 1 ? 'voted' : ''}"
              title="Votar positivo"
              ${myVote ? 'disabled' : ''}
              onclick="vote('${p.promotion_id}', 1)">▲</button>
            <span class="vote-score ${score > 0 ? 'positive' : score < 0 ? 'negative' : ''}">${score}</span>
            <button
              class="vote-btn down ${myVote === -1 ? 'voted' : ''}"
              title="Votar negativo"
              ${myVote ? 'disabled' : ''}
              onclick="vote('${p.promotion_id}', -1)">▼</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  /* ── vote ────────────────────────────────────────────────── */
  async function vote(promotionId, value) {
    if (votes[promotionId]) return; // já votou

    try {
      const res = await fetch(`${BASE_URL}/promocoes/${promotionId}/votos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vote: value })
      });

      if (!res.ok) throw new Error(await res.text());

      votes[promotionId] = value;
      /* atualiza score localmente para feedback imediato */
      const promo = promos.find(p => p.promotion_id === promotionId);
      if (promo) {
        promo.score = (promo.score ?? 0) + value;
        updateCardScore(promotionId, promo.score);
      }
      showToast(value === 1 ? '👍 Voto positivo registrado!' : '👎 Voto negativo registrado!', 'info');
    } catch (err) {
      showToast('Erro ao registrar voto: ' + err.message, 'error');
    }
  }

  function updateCardScore(id, score) {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    const scoreEl = card.querySelector('.vote-score');
    if (scoreEl) {
      scoreEl.textContent = score;
      scoreEl.className = 'vote-score' +
        (score > 0 ? ' positive' : score < 0 ? ' negative' : '');
    }
    /* desabilita ambos os botões */
    card.querySelectorAll('.vote-btn').forEach(btn => {
      btn.disabled = true;
      const isUp = btn.classList.contains('up');
      if ((isUp && score > 0) || (!isUp && score < 0)) btn.classList.add('voted');
    });
  }

  /* ── SSE ─────────────────────────────────────────────────── */
  function connectSSE() {
    if (eventSource) eventSource.close();

    const dot   = document.getElementById('sseDot');
    const label = document.getElementById('sseLabel');

    eventSource = new EventSource(`${BASE_URL}/sse?user_id=user1`);

    eventSource.onopen = () => {
      dot.className   = 'sse-dot connected';
      label.textContent = 'ao vivo';
    };

    eventSource.onerror = () => {
      dot.className   = 'sse-dot error';
      label.textContent = 'sem conexão';
      /* tenta reconectar em 5s */
      setTimeout(connectSSE, 5000);
    };

    /* evento genérico — o Gateway pode enviar event: "promocao" */
    eventSource.addEventListener('promocao', e => handleSSEEvent(e));

    /* fallback: mensagem sem tipo definido */
    eventSource.onmessage = e => handleSSEEvent(e);
  }

  function handleSSEEvent(e) {
    let data;
    try { 
      data = JSON.parse(e.data); 
    } catch (err) {
      console.error('Erro ao parsear SSE:', err, 'dados:', e.data);
      return;
    }

    console.log('[SSE] Evento recebido:', data); // debug

    const isHot = data.is_hot_deal === true;
    const cat   = data.category;

    /* se for hot deal, o card é marcado como destaque independente de notificação */
    if (isHot && data.promotion_id) {
      hotDeals.add(data.promotion_id);
      markCardAsHot(data.promotion_id);
    }

    /* decide se mostra a notificação (painel + toast):
       - categoria seguida: sempre mostra
       - hot deal: só mostra se o usuário ativou "Receber hot deals" */
    const showByCategory = followedCategories.has(cat);
    const showByHotDeal  = isHot && wantsHotDeals;

    if (!showByCategory && !showByHotDeal) return;

    addNotification(data);

    if (isHot) {
      showToast(`🔥 Hot deal: ${data.product_name}`, 'hot');
    }
  }

  function markCardAsHot(id) {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    card.classList.add('hot');
    if (!card.querySelector('.hot-badge')) {
      const top = card.querySelector('.card-top');
      const badge = document.createElement('span');
      badge.className = 'hot-badge';
      badge.textContent = '🔥 hot deal';
      top.appendChild(badge);
    }
  }

  /* ── notifications panel ──────────────────────────────────── */
  function addNotification(data) {
    const list  = document.getElementById('notifList');
    const empty = document.getElementById('notifEmpty');
    if (empty) empty.remove();

    const isHot = data.is_hot_deal;
    const now   = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    const item = document.createElement('div');
    item.className = 'notif-item' + (isHot ? ' hot' : '');
    item.innerHTML = `
      <div class="notif-tag ${isHot ? 'hot-tag' : ''}">${isHot ? '🔥 hot deal' : '📢 ' + data.category}</div>
      <div class="notif-product">${escHtml(data.product_name ?? 'Promoção')}</div>
      <div class="notif-time">${now}</div>`;
    list.prepend(item);
  }

  function clearNotifs() {
    const list = document.getElementById('notifList');
    list.innerHTML = `
      <div class="notif-empty" id="notifEmpty">
        Quando promoções das categorias que você segue forem publicadas ou virarem hot deal, elas aparecerão aqui automaticamente.
      </div>`;
  }

  /* ── toast ───────────────────────────────────────────────── */
  function showToast(msg, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  /* ── utils ───────────────────────────────────────────────── */
  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
